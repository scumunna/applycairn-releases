name: Verify public runtime

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify published checksums
        working-directory: release-assets
        run: sha256sum -c SHA256SUMS.txt
      - name: Verify required artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -s release-assets/ApplyCairn-Codex-0.4.1.zip
          test -s release-assets/ApplyCairn-Claude-Code-0.4.1.zip
          test -s release-assets/ApplyCairn-0.4.1.mcpb
          test -s plugins/applycairn/mcp/server.cjs
          test -s plugins/claude-code/mcp/server.cjs

  attest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Attest published runtime artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release-assets/ApplyCairn-Codex-0.4.1.zip
            release-assets/ApplyCairn-Claude-Code-0.4.1.zip
            release-assets/ApplyCairn-0.4.1.mcpb
